# Выделение памяти (4G достаточно для ThinkPad)
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -Dfile.encoding=UTF-8

# Поддержка современных библиотек
android.useAndroidX=true
android.enableJetifier=true

# КРИТИЧНО для Ubuntu 24.04 и AGP 9
# Отключаем новый интерфейс DSL, который ломает Flutter-плагин
android.newDsl=false
# Отключаем изоляцию песочницы (решает проблемы с доступом к файлам в 24.04)
android.experimental.privacysandbox.enable=false

# Оптимизация Kotlin
kotlin.code.style=official
# Позволяет избежать конфликтов дублирования классов в некоторых плагинах
android.externalsync=true

# Отключает новый интерфейс AGP 9, который несовместим с текущим плагином Flutter
android.newDsl=false
# Дополнительная мера для предотвращения изоляции процессов сборки в Ubuntu 24.04
android.experimental.privacysandbox.enable=false
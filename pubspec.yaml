name: findway_mobile
description: Global humanitarian search platform.
publish_to: 'none'

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Icons (Исправлен отступ)
  bootstrap_icons: ^1.10.0
  
  # ТИПОГРАФИКА (Для того самого Orbitron без ручной возни с файлами)
  google_fonts: ^6.1.0 
  
  # ВИЗУАЛЬНЫЕ ЭФФЕКТЫ
  # Для "стеклянных" карточек и размытия (Glassmorphism)
  glass: ^1.0.0
  # Для неонового мерцания и плавных появлений
  flutter_animate: ^4.5.0
  # Красивые лоадеры вместо стандартных кружков
  flutter_spinkit: ^5.2.0
  # Скелетоны для загрузки (Production-first UX)
  skeletonizer: ^1.2.0

  # State Management & DI
  flutter_bloc: ^8.1.0
  get_it: ^7.6.0
  
  dio_cookie_manager: ^3.0.0
  cookie_jar: ^4.0.8
  # Network & Data
  dio: ^5.4.0
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  dartz: ^0.10.1
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.14.0
  build_runner: ^2.4.8 # Обновил до стабильного

flutter:
  # ЭТОТ ФЛАГ ОБЯЗАТЕЛЕН
  # Он заставляет компилятор упаковать шрифт MaterialIcons.ttf в бандл приложения.
  # Без него стандартные Icons.search, Icons.filter_list и т.д. превратятся в те самые "конвертики".
  uses-material-design: true